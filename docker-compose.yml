services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clearnest
    ports:
      - '3306:3306'
    volumes:
      - clearnest_mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-proot']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  clearnest_mysql_data:
